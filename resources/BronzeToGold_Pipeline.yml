resources:
  jobs:
    medallion_pipeline_job:
      name: medallion_pipeline_job

      tags:
        domain: payments-gaming
        layer: bronze-silver-gold
        owner: muzi.mngadi
        managed_by: databricks-asset-bundle

      email_notifications:
        on_failure:
          - ${var.notification_email}
        no_alert_for_skipped_runs: false

      timeout_seconds: 3600
      max_concurrent_runs: 1

      schedule:
        quartz_cron_expression: "0 0 3 * * ?"
        timezone_id: Africa/Johannesburg
        pause_status: PAUSED   # flip to UNPAUSED once you've validated a manual run

      tasks:
        - task_key: bronze_ingest
          notebook_task:
            notebook_path: ../src/bronze/ingest_bronze.ipynb
          timeout_seconds: 1800
          max_retries: 2
          min_retry_interval_millis: 60000
          retry_on_timeout: true

        - task_key: silver_transform
          depends_on:
            - task_key: bronze_ingest
          notebook_task:
            notebook_path: "../src/silver/Bronze to Silver Ingestion.ipynb"
          timeout_seconds: 1800
          max_retries: 2
          min_retry_interval_millis: 60000
          retry_on_timeout: true

        - task_key: gold_customer
          depends_on:
            - task_key: silver_transform
          notebook_task:
            notebook_path: "../src/gold/Customer-Silver To Gold.ipynb"
          timeout_seconds: 1200
          max_retries: 1

        - task_key: gold_product
          depends_on:
            - task_key: silver_transform
          notebook_task:
            notebook_path: "../src/gold/Product-Silver To Gold.ipynb"
          timeout_seconds: 1200
          max_retries: 1

        - task_key: gold_sales
          depends_on:
            - task_key: silver_transform
          notebook_task:
            notebook_path: "../src/gold/Sales-Silver To Gold.ipynb"
          timeout_seconds: 1200
          max_retries: 1